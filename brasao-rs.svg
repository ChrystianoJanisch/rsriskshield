<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 132" fill="none" role="img" aria-label="Brasão RS Company">
  <defs>
    <linearGradient id="brGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF0C0"/>
      <stop offset="0.35" stop-color="#E8C66B"/>
      <stop offset="0.62" stop-color="#9C7426"/>
      <stop offset="0.82" stop-color="#D9B254"/>
      <stop offset="1" stop-color="#F2DC9B"/>
